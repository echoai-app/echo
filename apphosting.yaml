# Firebase App Hosting — Echo (Next.js 16 full-stack, SSR + API routes on Cloud Run)
# Secrets are referenced from Cloud Secret Manager by name (never stored here).
# NEXT_PUBLIC_* must be available at BUILD so they're inlined into the client bundle.

runConfig:
  # Scale-to-zero by default (cost-safe). Bump minInstances to 1 to keep a warm
  # instance for demos (faster first load + guest in-memory index survives idle).
  minInstances: 0
  maxInstances: 2
  concurrency: 80
  cpu: 1
  memoryMiB: 1024

env:
  # ── Public (inlined at build + available at runtime) ──────────────────────
  - variable: NEXT_PUBLIC_ECHO_PACKAGE_ID
    value: "0xec0f4d2bfb1eb7d8e4b5df2cd110f326301ace269b421188594ef8937bfb1715"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_SUI_NETWORK
    value: "testnet"
    availability:
      - BUILD
      - RUNTIME

  # ── Walrus testnet endpoints (server runtime) ─────────────────────────────
  - variable: WALRUS_NETWORK
    value: "testnet"
    availability:
      - RUNTIME
  - variable: WALRUS_PUBLISHER_URL
    value: "https://publisher.walrus-testnet.walrus.space"
    availability:
      - RUNTIME
  - variable: WALRUS_AGGREGATOR_URL
    value: "https://aggregator.walrus-testnet.walrus.space"
    availability:
      - RUNTIME

  # ── Secrets (Cloud Secret Manager — set via `firebase apphosting:secrets:set`) ──
  # GROQ is the required LLM provider; VOYAGE is optional (enables semantic recall).
  - variable: GROQ_API_KEY
    secret: GROQ_API_KEY
  - variable: VOYAGE_API_KEY
    secret: VOYAGE_API_KEY
