name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: typecheck · lint · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm run build
        env:
          # public testnet config is enough for a build; no secrets required
          NEXT_PUBLIC_SUI_NETWORK: testnet
